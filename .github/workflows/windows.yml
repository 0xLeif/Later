name: Windows

on:
  push:
    branches: ["**"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-6.1-release
          tag: 6.1-RELEASE
  
      - uses: actions/checkout@v4
      - run: swift build
      - run: swift test
